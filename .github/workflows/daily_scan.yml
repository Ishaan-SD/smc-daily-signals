name: Daily SMC Market Scanner

on:
  schedule:
    # GitHub Actions uses UTC time. 
    # 11:00 AM UTC is exactly 4:43 PM IST (After the Indian market closes).
    - cron: '13 11 * * *'
  
  # This line allows you to click a button to test it manually anytime
  workflow_dispatch: 

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Caches dependencies to make the run faster

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Daily Scan
      env:
        # This securely maps your GitHub Secrets back into the environment 
        # so your notifier.py os.environ.get() calls work perfectly.
        env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
        TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
        YOUR_WHATSAPP_NUMBER: ${{ secrets.YOUR_WHATSAPP_NUMBER }}
      run: |
        python main.py
